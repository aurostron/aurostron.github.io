<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aurostron's site</title>
  <meta name="description" content="AUROSTRON - developer, creative, dunno what I am doing.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface: rgba(15, 15, 17, 0.82);
      --border: rgba(255,255,255,0.1);
      --text: #fafafa;
      --muted: #a1a1aa;
      --link: #d4d4d8;
    }

    body {
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    #bg-gif {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    #bg-gif.fading { opacity: 0; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .top {
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
      padding: 1.75rem 1.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      object-fit: cover;
      flex-shrink: 0;
    }

    .info h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .info .role {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .info .bio {
      font-size: 0.88rem;
      color: var(--link);
    }

    .links { display: flex; flex-direction: column; }

    .links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.75rem;
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      transition: color 0.15s, background 0.15s;
    }

    .links a:last-child { border-bottom: none; }

    .links a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .links a::after {
      content: "→";
      opacity: 0.35;
      transition: opacity 0.15s, transform 0.15s;
    }

    .links a:hover::after {
      opacity: 0.8;
      transform: translateX(3px);
    }

    footer {
      padding: 0.75rem 1.75rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* Floating button */
    .cat-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      background: rgba(15, 15, 17, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .cat-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }

    .cat-btn:active { transform: scale(0.96); }
    .cat-btn:disabled { opacity: 0.5; cursor: default; }

    /* Top loading bar */
    .loading-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: #fff;
      opacity: 0;
      z-index: 200;
      transition: width 0s;
    }

    .loading-bar.active {
      opacity: 0.6;
      width: 80%;
      transition: width 2s ease-out;
    }

    @media (max-width: 480px) {
      .top { flex-direction: column; }
    }
  </style>
</head>
<body>

  <img id="bg-gif" src="" alt="">
  <div class="overlay"></div>
  <div class="loading-bar" id="loadingBar"></div>

  <main class="card">
    <div class="top">
      <!-- Replace src with your real photo, e.g. "photo.jpg" -->
      <img class="avatar" src="pfp.jpg" alt="xD">
      <div class="info">
        <h1>AUROSTRON</h1>
        <i class="role">"If life is a joke, I'm the comedian."</i>
        <h2 class="bio">‎ </h2>
        <h2 class="bio">Exploring web dev. </h2>
        <h2 class="bio">Creator and maintainer of hoGAMEGATA </h2> 
      </div>
    </div>

    <nav class="links">
      <a href="https://gamegata.xyz" target="_blank" rel="noopener">hoGAMEGATA</a>
      <a href="https://github.com/aurostron" target="_blank" rel="noopener">GitHub</a>
      <a href="https://gitfut.com/aurostron" target="_blank" rel="noopener">Cool Github</a>
     
    </nav>

    <footer>Have a great  <span id="yr"></span></footer>
  </main>

  <button class="cat-btn" id="catBtn">I like cats</button>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Curated funny/meme cat GIFs — direct Giphy CDN links, no API key needed
    const CATS = [
      'https://media.giphy.com/media/4a5b4AH9TG7zEgsEEe/giphy.gif'      // keyboard cat
  
    ];

    const bg  = document.getElementById('bg-gif');
    const btn = document.getElementById('catBtn');
    const bar = document.getElementById('loadingBar');

    // Shuffle so order is random each session
    const shuffled = CATS.slice().sort(() => Math.random() - 0.5);
    let index = 0;
    let busy = false;

    function loadCat(url) {
      busy = true;
      btn.disabled = true;

      bg.classList.add('fading');
      bar.classList.remove('active');
      void bar.offsetWidth;
      bar.classList.add('active');

      const tmp = new Image();
      tmp.onload = () => {
        bg.src = url;
        bg.classList.remove('fading');
        bar.classList.remove('active');
        busy = false;
        btn.disabled = false;
      };
      tmp.onerror = () => {
        // fallback to next in list
        bg.classList.remove('fading');
        bar.classList.remove('active');
        busy = false;
        btn.disabled = false;
      };
      tmp.src = url;
    }

    // Load first cat on page init
    loadCat(shuffled[index]);

    btn.addEventListener('click', () => {
      if (busy) return;
      index = (index + 1) % shuffled.length;
      loadCat(shuffled[index]);
    });
  </script>

</body>
</html>
